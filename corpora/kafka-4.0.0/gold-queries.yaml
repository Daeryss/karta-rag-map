  - id:    Q28
    query: "How does a Kafka broker gracefully shut down all its components?"
    type:  anti_pattern
    expected:
      - core/src/main/scala/kafka/server/BrokerServer.scala
      - core/src/main/scala/kafka/server/ReplicaManager.scala
      - core/src/main/scala/kafka/log/LogManager.scala
      - core/src/main/scala/kafka/coordinator/group/GroupCoordinator.scala
      - core/src/main/scala/kafka/network/SocketServer.scala
    rationale: |
      There is no single "shutdown class." Each subsystem (network acceptor, replica
      manager, log manager, group coordinator, transaction coordinator, etc.) owns its
      own shutdown method, and BrokerServer.shutdown is the orchestrator that calls
      them in a specific order. A reader who searches for "graceful shutdown" expecting
      one canonical implementation will find five plausible files and need all five
      together to understand the sequence. Recall@k across all five is the right metric.
    has_adversarial: false

  - id:    Q29
    query: "What happens inside a partition object when the controller assigns it a new leader?"
    type:  behavioural
    expected:
      - core/src/main/scala/kafka/cluster/Partition.scala
    rationale: |
      Partition.makeLeader / makeFollower contain the leadership-change handlers: they
      reset the leader-epoch, reinitialize the HW, set up fetcher subscriptions, and
      notify the replica manager. DelayedElectLeader is the purgatory entry for a
      pending leader-election request — peer in flow but not where leadership actually
      changes. ReplicaManager.becomeLeaderOrFollower is the broker-level entry point
      that calls Partition; it owns coordination across partitions, not the per-partition
      state transition.
    has_adversarial: true
    adversarial:
      - file: core/src/main/scala/kafka/server/DelayedElectLeader.scala
        type: sibling       # purgatory entry for elect-leader requests
      - file: core/src/main/scala/kafka/server/ReplicaManager.scala
        type: parent        # broker-level orchestrator

  - id:    Q30
    query: "What information does the broker store to identify a single log offset within a segment?"
    type:  direct_concept
    expected:
      - storage/src/main/java/org/apache/kafka/storage/internals/log/LogOffsetMetadata.java
    rationale: |
      LogOffsetMetadata is the triple (messageOffset, segmentBaseOffset, relativePosition)
      that locates an offset within a specific segment's byte stream. LogAppendInfo and
      LogReadInfo are the per-operation result records that contain LogOffsetMetadata
      but represent operations, not the offset identity itself.
    has_adversarial: true
